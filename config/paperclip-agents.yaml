  - agentId: agents-executive-ceo
    name: CEO
    role: ceo
    title: Chief Executive Officer
    reportsTo: null
    heartbeatEnabled: true
    budgetMonthlyCents: 10000
    type: task-worker
    lifecycle_bridge: unsupported
    completion_mode: in_review

  # --- Task-worker agents (Paperclip-managed heartbeats) ---

  # Bridge-supported specialists (050): direct Paperclip assignment works via bridge
