# Paperclip Agent Roster
# Used by scripts/paperclip-register-agents.py to register OpenClaw agents in Paperclip.
# See: docs/superpowers/specs/2026-03-20-paperclip-integration-design.md
#
# lifecycle_bridge: Agents enrolled in the paperclip-lifecycle-bridge extension (050).
#   - supported: Bridge intercepts Paperclip wakes, claims issues, delivers clean briefs.
#   - unsupported: Agent receives raw Paperclip wake procedure (must handle HTTP itself).
#   - not_enrolled: Not a Paperclip heartbeat worker.

gateway_url: "ws://127.0.0.1:18789"

agents:
